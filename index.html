<!DOCTYPE html> 
 <html lang="en"> 
 <head> 
 <meta charset="UTF-8" /> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/> 
 <title>Fintech Admin Dashboard</title> 
 
 <style> 
 body { 
   margin: 0; 
   font-family: Arial, sans-serif; 
   background: radial-gradient(circle at top, #1a1f2e, #0b0f1a); 
   color: #fff; 
 } 
 
 /* Layout */ 
 .dashboard { 
   display: grid; 
   grid-template-columns: 260px 1fr; 
   height: 100vh; 
 } 
 
 /* Sidebar */ 
 .sidebar { 
   background: rgba(255,255,255,0.05); 
   backdrop-filter: blur(12px); 
   padding: 20px; 
   border-right: 1px solid rgba(255,255,255,0.1); 
 } 
 
 .sidebar h2 { 
   font-size: 18px; 
   margin-bottom: 30px; 
 } 
 
 .nav-item { 
   padding: 12px; 
   margin-bottom: 10px; 
   border-radius: 10px; 
   background: rgba(255,255,255,0.05); 
   cursor: pointer; 
 } 
 
 /* Main */ 
 .main { 
   padding: 20px; 
 } 
 
 /* Top cards */ 
 .cards { 
   display: grid; 
   grid-template-columns: repeat(3, 1fr); 
   gap: 15px; 
 } 
 
 .card { 
   background: rgba(255,255,255,0.06); 
   backdrop-filter: blur(14px); 
   border-radius: 16px; 
   padding: 15px; 
   border: 1px solid rgba(255,255,255,0.1); 
 } 
 
 /* Status widget */ 
 .status-box { 
   margin-top: 20px; 
   background: rgba(255,255,255,0.06); 
   backdrop-filter: blur(14px); 
   padding: 20px; 
   border-radius: 16px; 
   border: 1px solid rgba(255,255,255,0.1); 
   max-width: 420px; 
 } 
 
 .status-title { 
   font-size: 18px; 
   margin-bottom: 10px; 
 } 
 
 .badge { 
   display: inline-block; 
   padding: 4px 10px; 
   border-radius: 20px; 
   font-size: 12px; 
   margin-bottom: 10px; 
 } 
 
 /* Service rows */ 
 .service { 
   display: flex; 
   justify-content: space-between; 
   margin-top: 8px; 
   padding: 6px 0; 
 } 
 
 .dot { 
   width: 10px; 
   height: 10px; 
   border-radius: 50%; 
   display: inline-block; 
 } 
 
 /* Colors */ 
 .green { background: #2ecc71; } 
 .orange { background: #f39c12; } 
 .red { background: #e74c3c; } 
 
 </style> 
 </head> 
 
 <body> 
 
 <div class="dashboard"> 
 
   <!-- Sidebar --> 
   <div class="sidebar"> 
     <h2>Fintech Admin</h2> 
     <div class="nav-item">Dashboard</div> 
     <div class="nav-item">Accounts</div> 
     <div class="nav-item">Transactions</div> 
     <div class="nav-item">System Health</div> 
   </div> 
 
   <!-- Main --> 
   <div class="main"> 
 
     <!-- Top summary cards --> 
     <div class="cards"> 
       <div class="card"> 
         <h3>Total Users</h3> 
         <p>1,248</p> 
       </div> 
 
       <div class="card"> 
         <h3>Transactions</h3> 
         <p>$98,430</p> 
       </div> 
 
       <div class="card"> 
         <h3>System Uptime</h3> 
         <p id="uptime">Loading...</p> 
       </div> 
     </div> 
 
     <!-- Status Widget --> 
     <div class="status-box"> 
 
       <div class="status-title">System Status</div> 
 
       <div id="overall" class="badge">Loading...</div> 
 
       <div class="service"> 
         <span>Database</span> 
         <span><span id="dbDot" class="dot"></span> <span id="dbText"></span></span> 
       </div> 
 
       <div class="service"> 
         <span>API</span> 
         <span><span id="apiDot" class="dot"></span> <span id="apiText"></span></span> 
       </div> 
 
       <div class="service"> 
         <span>Auth Service</span> 
         <span><span id="authDot" class="dot"></span> <span id="authText"></span></span> 
       </div> 
 
       <p style="font-size:12px;opacity:0.6;margin-top:10px;"> 
         Last update: <span id="time"></span> 
       </p> 
 
     </div> 
 
   </div> 
 </div> 
 
 <script> 
 
 let uptimeSeconds = 1240;

 function loadStatus() { 
   try { 
     // Mocking the data since we don't have a real backend running
     const data = {
       uptime: uptimeSeconds += 4,
       status: "operational",
       services: {
         database: "online",
         api: "online"
       },
       timestamp: new Date().toISOString()
     };
 
     // Uptime 
     document.getElementById("uptime").textContent = data.uptime + "s"; 
 
     // Overall badge 
     const overall = document.getElementById("overall"); 
     overall.textContent = data.status.toUpperCase(); 
 
     if (data.status === "operational") { 
       overall.style.background = "#1e7e34"; 
     } else { 
       overall.style.background = "#b9770e"; 
     } 
 
     // Services mapping 
     setService("db", data.services.database); 
     setService("api", data.services.api); 
     setService("auth", Math.random() > 0.1 ? "online" : "degraded"); 
 
     document.getElementById("time").textContent = 
       new Date(data.timestamp).toLocaleTimeString(); 
 
   } catch (e) { 
     document.getElementById("overall").textContent = "OFFLINE"; 
     document.getElementById("overall").style.background = "#c0392b"; 
   } 
 } 
 
 function setService(prefix, status) { 
   const dot = document.getElementById(prefix + "Dot"); 
   const text = document.getElementById(prefix + "Text"); 
 
   text.textContent = status; 
 
   if (status === "online") { 
     dot.className = "dot green"; 
   } else if (status === "degraded") { 
     dot.className = "dot orange"; 
   } else { 
     dot.className = "dot red"; 
   } 
 } 
 
 loadStatus(); 
 setInterval(loadStatus, 4000); 
 
 </script> 
 
 </body> 
 </html>
